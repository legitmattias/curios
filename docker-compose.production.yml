services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - curios_prod

  api:
    image: ghcr.io/legitmattias/curios-api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT}
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - curios_prod

  web:
    image: ghcr.io/legitmattias/curios-web:latest
    restart: unless-stopped
    environment:
      ORIGIN: ${ORIGIN}
    ports:
      - '3000:3000'
    depends_on:
      - api
    networks:
      - curios_prod

volumes:
  pgdata_prod:

networks:
  curios_prod:
