name: curios-production

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - curios_prod

  api:
    image: ghcr.io/legitmattias/curios-api:production
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DOSSIER_MCP_URL: ${DOSSIER_MCP_URL}
      DOSSIER_MCP_API_KEY: ${DOSSIER_MCP_API_KEY}
      CHAT_MAX_MESSAGES: ${CHAT_MAX_MESSAGES}
      DOSSIER_API_URL: ${DOSSIER_API_URL}
      DOSSIER_API_KEY: ${DOSSIER_API_KEY}
    ports:
      # Bound to loopback only — Caddy (api.mattic.dev) is the public entry point.
      - '127.0.0.1:4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - curios_prod

  web:
    image: ghcr.io/legitmattias/curios-web:production
    restart: unless-stopped
    environment:
      ORIGIN: ${ORIGIN}
      # Admin panel (/admin/*)
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      DOSSIER_API_KEY: ${DOSSIER_API_KEY}
      # Internal service URL so the web server-side proxy hits the api container
      # directly, bypassing Caddy.
      ADMIN_API_URL: http://api:4000
    ports:
      # Bound to loopback only — Caddy (mattiasubbesen.com) is the public entry point.
      - '127.0.0.1:3000:3000'
    depends_on:
      - api
    networks:
      - curios_prod

volumes:
  pgdata_prod:

networks:
  curios_prod:
