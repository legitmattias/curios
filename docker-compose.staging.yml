name: curios-staging

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - curios_staging

  api:
    image: ghcr.io/legitmattias/curios-api:staging
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${PORT}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DOSSIER_MCP_URL: ${DOSSIER_MCP_URL}
      DOSSIER_MCP_API_KEY: ${DOSSIER_MCP_API_KEY}
      CHAT_MAX_MESSAGES: ${CHAT_MAX_MESSAGES}
      DOSSIER_API_URL: ${DOSSIER_API_URL}
      DOSSIER_API_KEY: ${DOSSIER_API_KEY}
    ports:
      # Bound to loopback only — Caddy (api.staging.curios.mattic.dev) is the public entry point.
      - '127.0.0.1:4010:4000'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - curios_staging

  web:
    image: ghcr.io/legitmattias/curios-web:staging
    restart: unless-stopped
    environment:
      ORIGIN: ${ORIGIN}
    ports:
      # Bound to loopback only — Caddy (staging.curios.mattic.dev) is the public entry point.
      - '127.0.0.1:3010:3000'
    depends_on:
      - api
    networks:
      - curios_staging

volumes:
  pgdata_staging:

networks:
  curios_staging:
