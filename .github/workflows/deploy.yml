name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/legitmattias/curios-api
  WEB_IMAGE: ghcr.io/legitmattias/curios-web

jobs:
  # ── CI checks (same as ci.yml but gating deploy) ──────────
  test:
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: curios
          POSTGRES_PASSWORD: curios
          POSTGRES_DB: curios
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U curios"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: postgres://curios:curios@localhost:5432/curios
      PUBLIC_API_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @curios/web exec playwright install chromium
      - run: pnpm lint
      - run: pnpm --filter @curios/api db:migrate
      - run: pnpm --filter @curios/api db:seed
      - run: pnpm test
      - run: pnpm build

  # ── Build and push Docker images ──────────────────────────
  build-and-push:
    needs: test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # API image — same for both environments
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:staging
            ${{ env.API_IMAGE }}:production
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      # Web staging image (PUBLIC_API_URL baked in at build time)
      - name: Build and push Web staging image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/web/Dockerfile
          push: true
          build-args: |
            PUBLIC_API_URL=https://staging.curios.mattic.dev/api
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}-staging
            ${{ env.WEB_IMAGE }}:staging
          cache-from: type=gha,scope=web-staging
          cache-to: type=gha,scope=web-staging,mode=max

      # Web production image — only built on workflow_dispatch for production
      - name: Build and push Web production image
        if: github.event.inputs.environment == 'production'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/web/Dockerfile
          push: true
          build-args: |
            PUBLIC_API_URL=https://curios.mattic.dev/api
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.WEB_IMAGE }}:production
          cache-from: type=gha,scope=web-prod
          cache-to: type=gha,scope=web-prod,mode=max

  # ── Deploy to staging ─────────────────────────────────────
  # Uses Docker context over SSH — the CI runner reads the compose file
  # locally and sends Docker API calls to the remote daemon. No files
  # are copied to the server; env vars never touch disk on the VPS.
  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-24.04
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          printf 'Host %s\n  IdentityFile %s\n' \
            "${{ secrets.DEPLOY_HOST }}" "$HOME/.ssh/deploy_key" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy
        env:
          DOCKER_HOST: ssh://${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
          # Postgres
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PORT: ${{ vars.PORT }}
          # Web
          ORIGIN: ${{ vars.ORIGIN }}
          # Chat / Dossier
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DOSSIER_MCP_URL: ${{ vars.DOSSIER_MCP_URL }}
          DOSSIER_MCP_API_KEY: ${{ secrets.DOSSIER_MCP_API_KEY }}
          CHAT_MAX_MESSAGES: ${{ vars.CHAT_MAX_MESSAGES }}
          DOSSIER_API_URL: ${{ vars.DOSSIER_API_URL }}
          DOSSIER_API_KEY: ${{ secrets.DOSSIER_API_KEY }}
          # Seed content (private JSON from curios-dev — see update-secret.sh)
          CURIOS_SEED_CONTENT: ${{ secrets.CURIOS_SEED_CONTENT }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker compose -f docker-compose.staging.yml pull
          docker compose -f docker-compose.staging.yml up -d
          docker compose -f docker-compose.staging.yml exec -T api bunx drizzle-kit migrate
          docker compose -f docker-compose.staging.yml exec -T -e SEED_CONTENT_JSON="$CURIOS_SEED_CONTENT" api bun run src/db/seed.ts

      - name: Health check
        run: |
          echo "Waiting for services..."
          sleep 5
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'curl -sf http://127.0.0.1:4010/health || (echo "API health check failed" && exit 1)'
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'curl -sf http://127.0.0.1:3010 || (echo "Web health check failed" && exit 1)'
          echo "Staging deploy complete."

  # ── Deploy to production ──────────────────────────────────
  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-24.04
    environment: production
    if: github.event.inputs.environment == 'production'

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          printf 'Host %s\n  IdentityFile %s\n' \
            "${{ secrets.DEPLOY_HOST }}" "$HOME/.ssh/deploy_key" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy
        env:
          DOCKER_HOST: ssh://${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
          # Postgres
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PORT: ${{ vars.PORT }}
          # Web
          ORIGIN: ${{ vars.ORIGIN }}
          # Chat / Dossier
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DOSSIER_MCP_URL: ${{ vars.DOSSIER_MCP_URL }}
          DOSSIER_MCP_API_KEY: ${{ secrets.DOSSIER_MCP_API_KEY }}
          CHAT_MAX_MESSAGES: ${{ vars.CHAT_MAX_MESSAGES }}
          DOSSIER_API_URL: ${{ vars.DOSSIER_API_URL }}
          DOSSIER_API_KEY: ${{ secrets.DOSSIER_API_KEY }}
          # Seed content (private JSON from curios-dev — see update-secret.sh)
          CURIOS_SEED_CONTENT: ${{ secrets.CURIOS_SEED_CONTENT }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker compose -f docker-compose.production.yml pull
          docker compose -f docker-compose.production.yml up -d
          docker compose -f docker-compose.production.yml exec -T api bunx drizzle-kit migrate
          docker compose -f docker-compose.production.yml exec -T -e SEED_CONTENT_JSON="$CURIOS_SEED_CONTENT" api bun run src/db/seed.ts

      - name: Health check
        run: |
          echo "Waiting for services..."
          sleep 5
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'curl -sf http://127.0.0.1:4000/health || (echo "API health check failed" && exit 1)'
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'curl -sf http://127.0.0.1:3000 || (echo "Web health check failed" && exit 1)'
          echo "Production deploy complete."
