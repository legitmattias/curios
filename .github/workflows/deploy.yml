name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/legitmattias/curios-api
  WEB_IMAGE: ghcr.io/legitmattias/curios-web

jobs:
  # ── CI checks (same as ci.yml but gating deploy) ──────────
  test:
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: curios
          POSTGRES_PASSWORD: curios
          POSTGRES_DB: curios
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U curios"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: postgres://curios:curios@localhost:5432/curios
      PUBLIC_API_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @curios/web exec playwright install chromium
      - run: pnpm lint
      - run: pnpm --filter @curios/api db:migrate
      - run: pnpm test
      - run: pnpm build

  # ── Build and push Docker images ──────────────────────────
  build-and-push:
    needs: test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # API image — same for both environments
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:staging
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      # Web staging image (PUBLIC_API_URL baked in at build time)
      - name: Build and push Web staging image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/web/Dockerfile
          push: true
          build-args: |
            PUBLIC_API_URL=https://api.staging.mattic.dev
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}-staging
            ${{ env.WEB_IMAGE }}:staging
          cache-from: type=gha,scope=web-staging
          cache-to: type=gha,scope=web-staging,mode=max

      # Web production image — only built on workflow_dispatch for production
      - name: Build and push Web production image
        if: github.event.inputs.environment == 'production'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/web/Dockerfile
          push: true
          build-args: |
            PUBLIC_API_URL=https://api.mattic.dev
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha,scope=web-prod
          cache-to: type=gha,scope=web-prod,mode=max

  # ── Deploy to staging ─────────────────────────────────────
  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-24.04
    environment: staging

    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /srv/curios/staging

            # Pull new images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull

            # Restart services (postgres untouched if unchanged)
            docker compose up -d

            # Run migrations
            docker compose exec -T api bunx drizzle-kit migrate

            # Health checks
            echo "Waiting for services..."
            sleep 5
            curl -sf http://localhost:4010/health || (echo "API health check failed" && exit 1)
            curl -sf http://localhost:3010 || (echo "Web health check failed" && exit 1)
            echo "Staging deploy complete."

  # ── Deploy to production ──────────────────────────────────
  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-24.04
    environment: production
    if: github.event.inputs.environment == 'production'

    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /srv/curios/production

            # Pull new images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull

            # Restart services
            docker compose up -d

            # Run migrations
            docker compose exec -T api bunx drizzle-kit migrate

            # Health checks
            echo "Waiting for services..."
            sleep 5
            curl -sf http://localhost:4000/health || (echo "API health check failed" && exit 1)
            curl -sf http://localhost:3000 || (echo "Web health check failed" && exit 1)
            echo "Production deploy complete."
