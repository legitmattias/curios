name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-24.04

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: curios
          POSTGRES_PASSWORD: curios
          POSTGRES_DB: curios
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U curios"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: postgres://curios:curios@localhost:5432/curios

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @curios/web exec playwright install chromium

      - name: Lint
        run: pnpm lint

      - name: Run migrations
        run: pnpm --filter @curios/api db:migrate

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
